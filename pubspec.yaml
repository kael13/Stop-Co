name: stop_co
description: "A minimalist GPS-based destination alarm app for commuters."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.3.0

  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  geolocator: ^13.0.2
  permission_handler: ^11.4.0
  flutter_local_notifications: ^18.0.1

  http: ^1.3.0
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.0
  intl: ^0.20.2
  collection: ^1.19.1
  uuid: ^4.5.1
  shared_preferences: ^2.4.0
  lottie: ^3.3.0
  screen_brightness: ^2.1.11
  wakelock_plus: ^1.6.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.21.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/animations/
